<svg width="680" height="770" viewBox="0 0 680 770" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', monospace">
  <title>The Auditor's Crisis Response Loop</title>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- STEP 1 — light gray -->
  <rect x="140" y="28" width="400" height="56" rx="0" fill="#e8e6e0" stroke="#bbb" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" x="340" y="52" text-anchor="middle" fill="#1a1714">1 — Passive Monitoring</text>
  <text font-size="11" x="340" y="72" text-anchor="middle" fill="#555">Live transaction ingestion · Intersectional matrix</text>

  <!-- down -->
  <line x1="340" y1="84" x2="340" y2="116" stroke="#888" stroke-width="0.5" marker-end="url(#arr)"/>

  <!-- DECISION diamond -->
  <polygon points="340,116 430,150 340,184 250,150" fill="none" stroke="#888" stroke-width="0.5"/>
  <text font-size="12" font-weight="600" x="340" y="146" text-anchor="middle" fill="#1a1714">Bias Ratio</text>
  <text font-size="11" x="340" y="162" text-anchor="middle" fill="#555">Threshold check</text>

  <!-- PASS right -->
  <line x1="430" y1="150" x2="536" y2="150" stroke="#2d7a6b" stroke-width="0.5" marker-end="url(#arr)"/>
  <text font-size="10" x="480" y="142" text-anchor="middle" fill="#555">Pass</text>
  <rect x="536" y="122" width="116" height="56" rx="0" fill="#2d7a6b" stroke="#2d7a6b" stroke-width="0.5"/>
  <text font-size="12" font-weight="600" x="594" y="146" text-anchor="middle" fill="#ffffff">Continue</text>
  <text font-size="11" x="594" y="162" text-anchor="middle" fill="rgba(255,255,255,0.8)">Background log</text>

  <!-- FAIL down -->
  <line x1="340" y1="184" x2="340" y2="220" stroke="#888" stroke-width="0.5" marker-end="url(#arr)"/>
  <text font-size="10" x="358" y="205" fill="#555">Fail · Ratio ≥ 1.30×</text>

  <!-- STEP 2 — deep brick red -->
  <rect x="140" y="220" width="400" height="72" rx="0" fill="#b03a2e" stroke="#b03a2e" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" x="340" y="248" text-anchor="middle" fill="#ffffff">2 — Article 14 Human Oversight Breach</text>
  <text font-size="11" x="340" y="266" text-anchor="middle" fill="rgba(255,255,255,0.8)">Sensitive API logs restricted · Auditor notified</text>
  <text font-size="11" x="340" y="282" text-anchor="middle" fill="rgba(255,255,255,0.8)">Operations suspended until remediation</text>

  <line x1="340" y1="292" x2="340" y2="328" stroke="#888" stroke-width="0.5" marker-end="url(#arr)"/>

  <!-- STEP 3 — deep amber brown -->
  <rect x="140" y="328" width="400" height="88" rx="0" fill="#c67c2e" stroke="#c67c2e" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" x="340" y="356" text-anchor="middle" fill="#ffffff">3 — Forensic Defence &amp; Sign-off</text>
  <text font-size="11" x="340" y="374" text-anchor="middle" fill="rgba(255,255,255,0.85)">Auditor reviews data quality &amp; disparity charts</text>
  <text font-size="11" x="340" y="390" text-anchor="middle" fill="rgba(255,255,255,0.85)">Mandatory justification · ≥ 20 characters</text>
  <text font-size="11" x="340" y="406" text-anchor="middle" fill="rgba(255,255,255,0.85)">Digital sign-off → SHA-256 Article 11 technical file</text>

  <line x1="340" y1="416" x2="340" y2="452" stroke="#888" stroke-width="0.5" marker-end="url(#arr)"/>

  <!-- STEP 4 — deep teal green -->
  <rect x="140" y="452" width="400" height="72" rx="0" fill="#2d7a6b" stroke="#2d7a6b" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" x="340" y="480" text-anchor="middle" fill="#ffffff">4 — Re-certification &amp; Recovery</text>
  <text font-size="11" x="340" y="498" text-anchor="middle" fill="rgba(255,255,255,0.85)">System state → CERTIFIED</text>
  <text font-size="11" x="340" y="514" text-anchor="middle" fill="rgba(255,255,255,0.85)">Restricted APIs unlocked · Live monitoring resumes</text>

  <!-- EMERGENCY BRAKE side branch -->
  <text font-size="10" x="92" y="355" text-anchor="middle" fill="#aaa">Critical spike</text>
  <text font-size="10" x="92" y="369" text-anchor="middle" fill="#aaa">bias ≥ 1.95×</text>
  <line x1="140" y1="385" x2="100" y2="385" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="100" y1="385" x2="100" y2="590" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="100" y1="590" x2="138" y2="590" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- Emergency brake box — larger, deep purple -->
  <rect x="138" y="560" width="260" height="60" rx="0" fill="#4a3f8a" stroke="#4a3f8a" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" x="268" y="585" text-anchor="middle" fill="#ffffff">Emergency Brake</text>
  <text font-size="11" x="268" y="603" text-anchor="middle" fill="rgba(255,255,255,0.8)">API lockdown · Static fallback</text>

  <!-- LEGEND -->
  <line x1="40" y1="652" x2="640" y2="652" stroke="#ddd" stroke-width="0.5"/>

  <rect x="40" y="666" width="12" height="12" fill="#b03a2e"/>
  <text font-size="10" x="58" y="676" fill="#888">Articles 13 &amp; 14 — Transparency &amp; oversight</text>

  <rect x="40" y="684" width="12" height="12" fill="#c67c2e"/>
  <text font-size="10" x="58" y="694" fill="#888">Article 11 — Technical documentation</text>

  <rect x="40" y="702" width="12" height="12" fill="#2d7a6b"/>
  <text font-size="10" x="58" y="712" fill="#888">Article 10 — Data governance</text>

  <rect x="40" y="720" width="12" height="12" fill="#4a3f8a"/>
  <text font-size="10" x="58" y="730" fill="#888">Article 15 — Robustness &amp; containment</text>

  <line x1="40" y1="744" x2="56" y2="744" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text font-size="10" x="62" y="748" fill="#aaa">Critical escalation path</text>

</svg>
