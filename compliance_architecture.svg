<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-labelledby="ca-title ca-desc">
  <title id="ca-title">AI Governance Dashboard - compliance architecture</title>
  <desc id="ca-desc">
    EU AI Act compliance flow from production pricing through four modules to outputs.
    British English labels throughout where applicable.
  </desc>
  <defs>
    <marker id="ca-arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#666" />
    </marker>
  </defs>
  <g font-family="'IBM Plex Mono', ui-monospace, monospace">

    <!-- Input -->
    <rect x="300" y="28" width="400" height="44" rx="0" fill="#eaeaea" stroke="rgba(0,0,0,0.12)" />
    <text x="500" y="54" text-anchor="middle" fill="#111" font-size="12" font-weight="600">Production pricing model</text>
    <line x1="500" y1="72" x2="500" y2="102" stroke="#999" marker-end="url(#ca-arr)" />
    <text x="514" y="93" fill="#444" font-size="8.5">API endpoint</text>

    <rect x="267" y="102" width="466" height="52" rx="0" fill="#eaeaea" stroke="rgba(0,0,0,0.12)" />
    <text x="500" y="126" text-anchor="middle" fill="#111" font-size="11.5" font-weight="600">Real-time transaction stream</text>
    <text x="500" y="142" text-anchor="middle" fill="#555" font-size="8.5">Up to 2,000-record batches</text>

    <!-- Branches -->
    <path d="M500 154 L500 174 L130 174 L130 192" fill="none" stroke="#999" marker-end="url(#ca-arr)" />
    <path d="M500 154 L500 174 L362 174 L362 192" fill="none" stroke="#999" marker-end="url(#ca-arr)" />
    <path d="M500 154 L500 174 L594 174 L594 192" fill="none" stroke="#999" marker-end="url(#ca-arr)" />
    <path d="M500 154 L500 174 L848 174 L848 192" fill="none" stroke="#999" marker-end="url(#ca-arr)" />

    <!-- Bias -->
    <rect x="22" y="192" width="216" height="72" rx="0" fill="#b84a34" stroke="#8a3928" />
    <text x="130" y="216" text-anchor="middle" fill="#fff" font-size="10.5" font-weight="600">Bias detection</text>
    <text x="130" y="234" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8">Disparity matrix</text>
    <text x="130" y="248" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="8">Dynamic thresholds</text>
    <rect x="22" y="278" width="216" height="46" rx="0" fill="#9a402e" stroke="#7a3224" />
    <text x="130" y="300" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Articles 10 &amp; 13</text>
    <text x="130" y="314" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="7.5">Data &amp; transparency</text>
    <line x1="130" y1="324" x2="130" y2="412" stroke="#999" marker-end="url(#ca-arr)" />

    <!-- Human -->
    <rect x="254" y="192" width="216" height="72" rx="0" fill="#c48a28" stroke="#9a6f20" />
    <text x="362" y="216" text-anchor="middle" fill="#fff" font-size="10.5" font-weight="600">Human oversight</text>
    <text x="362" y="234" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="8">Mandatory sign-off</text>
    <text x="362" y="248" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="8">Restricted workflow</text>
    <rect x="254" y="278" width="216" height="46" rx="0" fill="#a67320" stroke="#855c1c" />
    <text x="362" y="300" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Article 14</text>
    <text x="362" y="314" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="7.5">Human oversight</text>
    <line x1="362" y1="324" x2="362" y2="412" stroke="#999" marker-end="url(#ca-arr)" />

    <!-- Audit -->
    <rect x="486" y="192" width="216" height="72" rx="0" fill="#2f7a74" stroke="#256059" />
    <text x="594" y="216" text-anchor="middle" fill="#fff" font-size="10.5" font-weight="600">Audit trail</text>
    <text x="594" y="234" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="8">SHA-256 fingerprint</text>
    <text x="594" y="248" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="8">PDF generation</text>
    <rect x="486" y="278" width="216" height="46" rx="0" fill="#286860" stroke="#20544e" />
    <text x="594" y="300" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Article 11</text>
    <text x="594" y="314" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="7.5">Technical documentation</text>
    <line x1="594" y1="324" x2="594" y2="412" stroke="#999" marker-end="url(#ca-arr)" />

    <!-- Containment -->
    <rect x="718" y="192" width="260" height="72" rx="0" fill="#4c4a8f" stroke="#3c3a73" />
    <text x="848" y="216" text-anchor="middle" fill="#fff" font-size="10.5" font-weight="600">Containment</text>
    <text x="848" y="234" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="8">API lockdown</text>
    <text x="848" y="248" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="8">Emergency brake</text>
    <rect x="718" y="278" width="260" height="46" rx="0" fill="#413f78" stroke="#33315e" />
    <text x="848" y="300" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Article 15</text>
    <text x="848" y="314" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="7.5">Accuracy &amp; robustness</text>
    <line x1="848" y1="324" x2="848" y2="412" stroke="#999" marker-end="url(#ca-arr)" />

    <line x1="48" y1="430" x2="952" y2="430" stroke="#c8c8c8" />
    <text x="500" y="426" text-anchor="middle" font-size="9" fill="#666" letter-spacing="0.12em">OUTPUT</text>

    <rect x="22" y="448" width="216" height="44" rx="0" fill="#f0f0f0" stroke="rgba(0,0,0,0.1)" />
    <text x="130" y="474" text-anchor="middle" fill="#111" font-size="9.5" font-weight="600">Bias report</text>

    <rect x="254" y="448" width="216" height="44" rx="0" fill="#f0f0f0" stroke="rgba(0,0,0,0.1)" />
    <text x="362" y="474" text-anchor="middle" fill="#111" font-size="9.5" font-weight="600">Signed audit log</text>

    <rect x="486" y="448" width="216" height="44" rx="0" fill="#f0f0f0" stroke="rgba(0,0,0,0.1)" />
    <text x="594" y="474" text-anchor="middle" fill="#111" font-size="9.5" font-weight="600">PDF + SHA-256</text>

    <rect x="718" y="448" width="260" height="44" rx="0" fill="#f0f0f0" stroke="rgba(0,0,0,0.1)" />
    <text x="848" y="474" text-anchor="middle" fill="#111" font-size="9.5" font-weight="600">Incident record</text>

    <text x="500" y="548" text-anchor="middle" fill="#444" font-size="8.5">
      EU AI Act compliance &#183; Articles 10, 11, 13, 14, 15
    </text>
    <text x="500" y="568" text-anchor="middle" fill="#666" font-size="8">
      React &#183; Tailwind CSS &#183; Flask &#183; Python (SciPy / Pandas)
    </text>
  </g>
</svg>
