<svg width="760" height="500" viewBox="0 0 760 500" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', monospace">
  <title>AI Governance Dashboard — Product Lifecycle Roadmap</title>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Spine -->
  <line x1="80" y1="40" x2="80" y2="430" stroke="#ccc" stroke-width="0.5"/>

  <!-- Phase 1 — coral/red -->
  <circle cx="80" cy="72" r="6" fill="#b03a2e"/>
  <line x1="86" y1="72" x2="120" y2="72" stroke="#b03a2e" stroke-width="0.5"/>
  <rect x="120" y="50" width="620" height="44" rx="0" fill="#b03a2e" stroke="#b03a2e" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" x="136" y="68" dominant-baseline="central" fill="#ffffff">Phase 1 — Ingestion &amp; Bias Detection MVP</text>
  <text font-size="10" x="136" y="84" dominant-baseline="central" fill="rgba(255,255,255,0.8)">Articles 10 &amp; 13 · Data Governance &amp; Transparency · August 2025 Deadline</text>
  <text font-size="10" x="136" y="108" dominant-baseline="central" fill="#888">Core streaming backend · Intersectional disparity matrix · Dynamic threshold sliders</text>

  <!-- Phase 2 — amber -->
  <circle cx="80" cy="172" r="6" fill="#c67c2e"/>
  <line x1="86" y1="172" x2="120" y2="172" stroke="#c67c2e" stroke-width="0.5"/>
  <rect x="120" y="150" width="620" height="44" rx="0" fill="#c67c2e" stroke="#c67c2e" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" x="136" y="168" dominant-baseline="central" fill="#ffffff">Phase 2 — Forensic Accounting &amp; Audit Integrity</text>
  <text font-size="10" x="136" y="184" dominant-baseline="central" fill="rgba(255,255,255,0.8)">Articles 11 &amp; 14 · Technical Documentation &amp; Human Oversight · August 2026 Deadline</text>
  <text font-size="10" x="136" y="208" dominant-baseline="central" fill="#888">Human-in-the-loop gated workflow · PDF generation · SHA-256 hashing</text>

  <!-- Phase 3 — purple -->
  <circle cx="80" cy="272" r="6" fill="#4a3f8a"/>
  <line x1="86" y1="272" x2="120" y2="272" stroke="#4a3f8a" stroke-width="0.5"/>
  <rect x="120" y="250" width="620" height="44" rx="0" fill="#4a3f8a" stroke="#4a3f8a" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" x="136" y="268" dominant-baseline="central" fill="#ffffff">Phase 3 — Active Containment &amp; Safe Fallbacks</text>
  <text font-size="10" x="136" y="284" dominant-baseline="central" fill="rgba(255,255,255,0.8)">Article 15 · Robustness &amp; Cybersecurity · August 2026 Deadline</text>
  <text font-size="10" x="136" y="308" dominant-baseline="central" fill="#888">Adversarial simulation · State-machine lockdown · Emergency brake</text>

  <!-- Phase 4 — gray/backlog -->
  <circle cx="80" cy="372" r="6" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <line x1="86" y1="372" x2="120" y2="372" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
  <rect x="120" y="350" width="620" height="44" rx="0" fill="#e8e6e0" stroke="#bbb" stroke-width="0.5"/>
  <text font-size="13" font-weight="600" x="136" y="368" dominant-baseline="central" fill="#1a1714">Phase 4 — Ecosystem Integration</text>
  <text font-size="10" x="136" y="384" dominant-baseline="central" fill="#555">Post-market Monitoring · Supervisory Authority Reporting · August 2027 Backlog</text>
  <text font-size="10" x="136" y="408" dominant-baseline="central" fill="#888">Multi-tenant ERP webhooks · Automated encrypted submissions</text>

  <!-- Legend -->
  <line x1="80" y1="438" x2="740" y2="438" stroke="#ddd" stroke-width="0.5"/>
  <circle cx="96" cy="456" r="5" fill="#2d7a6b"/>
  <text font-size="10" x="108" y="456" dominant-baseline="central" fill="#888">Delivered</text>
  <circle cx="210" cy="456" r="5" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <text font-size="10" x="222" y="456" dominant-baseline="central" fill="#888">Backlog</text>
  <text font-size="10" x="740" y="456" text-anchor="end" dominant-baseline="central" fill="#aaa">Aligned with EU AI Act Enforcement Timeline</text>

